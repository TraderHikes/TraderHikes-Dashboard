name: TraderHikes Daily Data Pipeline

on:
  # Run automatically at 4:30 PM IST = 11:00 AM UTC
  schedule:
    - cron: '0 11 * * 1-5'   # Mon–Fri only (market days)

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'Manual update'

jobs:
  update-dashboard:
    name: Fetch NSE Data & Update Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Step 1: Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance supabase pandas pytz

      # Step 4: Run the data pipeline
      - name: Run data pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python update_dashboard.py

      # Step 5: Report result
      - name: Pipeline complete
        if: success()
        run: echo "✅ Dashboard data updated successfully for $(date '+%Y-%m-%d')"

      - name: Pipeline failed
        if: failure()
        run: echo "❌ Pipeline failed. Check logs above."
