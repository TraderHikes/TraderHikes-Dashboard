name: TraderHikes Daily Data Pipeline

on:
  schedule:
    # All times in UTC. IST = UTC + 5:30
    - cron: '30 4 * * 1-5'   # 10:00 AM IST — intraday update
    - cron: '31 6 * * 1-5'   # 12:01 PM IST — intraday update
    - cron: '30 8 * * 1-5'   #  2:00 PM IST — intraday update
    - cron: '0 11 * * 1-5'   #  4:30 PM IST — full EOD run
    - cron: '0 14 * * 1-5'   #  7:30 PM IST — FII/DII fetch

  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode (intraday / full_eod / fii_dii)'
        required: false
        default: 'full_eod'

jobs:
  update-dashboard:
    name: Fetch NSE Data & Update Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance supabase pandas pytz requests

      - name: Run data pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || '' }}
        run: |
          python update_dashboard.py

      - name: Done
        if: success()
        run: |
          echo "✅ Pipeline complete"
          echo "   $(TZ='Asia/Kolkata' date '+%d %b %Y · %I:%M %p IST')"

      - name: Failed
        if: failure()
        run: echo "❌ Pipeline failed. Check logs above."
