name: TraderHikes Daily Data Pipeline

on:
  # 4:30 PM IST = 11:00 AM UTC, Monday–Friday
  schedule:
    - cron: '0 11 * * 1-5'

  # Manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-dashboard:
    name: Fetch NSE Data & Update Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Full Nifty 500 needs more time

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance supabase pandas pytz requests

      - name: Run data pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python update_dashboard.py

      - name: Done
        if: success()
        run: |
          echo "✅ Dashboard updated successfully"
          echo "   Date: $(date '+%Y-%m-%d')"
          echo "   Time: $(TZ='Asia/Kolkata' date '+%I:%M %p IST')"

      - name: Failed
        if: failure()
        run: echo "❌ Pipeline failed. Check logs above for details."
